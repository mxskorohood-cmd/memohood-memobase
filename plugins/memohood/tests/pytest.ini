[pytest]
# This file lives INSIDE tests/ (not the plugin root) on purpose -- mirrors
# plugins/hermes-kb/tests/pytest.ini's rationale exactly (see that file's own
# comment): the plugin root (plugins/memohood/) has its own __init__.py
# using relative imports that are only valid when loaded through a package
# context (conftest.py's load_plugin_package). If pytest.ini lived one level
# up, pytest's rootdir would become the plugin root and pytest would try to
# import plugins/memohood/__init__.py directly as a bare top-level module,
# crashing on its relative imports regardless of --import-mode. Keeping
# pytest.ini here makes tests/ itself the rootdir.
#
# --import-mode=importlib (DESIGN_v1.md "KB lesson"): forces every test run
# to genuinely re-import the plugin package fresh via conftest.py's
# load_plugin_package helper, instead of pytest's default rootdir-sys.path
# insertion / module-name caching defeating the per-test isolation this
# suite depends on.
addopts = -ra --import-mode=importlib
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    integration: needs real API keys (CLOUDFLARE_ACCOUNT_ID/CLOUDFLARE_API_TOKEN/COHERE_API_KEY) read from the real ~/.hermes/.env; auto-skipped when absent. GEMINI_API_KEY-dependent paths are separately skipped when that key is absent.
