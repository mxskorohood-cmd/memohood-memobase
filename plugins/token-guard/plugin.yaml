name: token-guard
version: 0.1.0
description: >
  Наблюдение за расходом токенов и стоимостью: журнал запросов (SQLite),
  детектор смены модели внутри сессии (потеря кэша), аудит конфигурации
  и необязательные переключатели экономии (модели дешевле для служебных
  задач, кэш на 1 час). Часть 1 ничего не меняет в поведении модели —
  только наблюдает. Часть 2 — тумблеры, выключены по умолчанию.
author: Maxim Vasko
kind: standalone
provides_hooks:
  - post_api_request
  - api_request_error
  - post_tool_call
provides_tools: []
requires_env: []
