[pytest]
# This file lives INSIDE tests/ (not the plugin root) on purpose: the plugin
# root (plugins/hermes-kb/) has its own __init__.py (the real hermes
# register(ctx) entry point, which uses relative imports and is only valid
# when loaded through the hermes plugin loader's synthetic package name --
# see conftest.py's load_plugin_package). If pytest.ini lived one level up,
# pytest's rootdir would become the plugin root, and pytest unconditionally
# builds Package/Dir collector nodes for every directory between rootdir and
# a collected test file -- which would make it import plugins/hermes-kb/
# __init__.py directly as a bare top-level module and crash on its relative
# imports (ImportError: attempted relative import with no known parent
# package), regardless of --import-mode. Keeping pytest.ini here makes tests/
# itself the rootdir, so that ancestor directory is never visited.
#
# Token-guard per DESIGN_v1.md's Tests section: force importlib import mode so
# every test run genuinely re-imports the plugin package fresh (see
# tests/conftest.py's load_plugin_package helper) instead of relying on
# pytest's default rootdir-sys.path insertion / module-name caching, which
# would defeat the per-test isolation this suite depends on.
addopts = -ra --import-mode=importlib
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    integration: needs real API keys (CLOUDFLARE_ACCOUNT_ID/CLOUDFLARE_API_TOKEN/COHERE_API_KEY) read from the real ~/.hermes/.env; auto-skipped when absent.
