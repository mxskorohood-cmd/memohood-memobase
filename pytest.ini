[pytest]
; plugins/token-guard/__init__.py makes that directory a regular Python
; package, but plugins/token-guard/tests/ has no __init__.py of its own.
; Under pytest's default "prepend" import mode, if pytest.ini (and hence
; rootdir) lived inside plugins/token-guard/ itself, rootdir/package-root
; resolution would try to import plugins/token-guard/__init__.py directly
; while establishing the test module's parent package, which fails with
; "ImportError: attempted relative import with no known parent package"
; (that __init__.py does `from . import audit, ...` and has no package
; context when imported standalone). Keeping this ini at the repo root
; (well above the package dir) plus --import-mode=importlib sidesteps
; rootdir package-root inference entirely: each test file is imported by
; its own file path, matching what tests/test_plugin.py already assumes
; for loading the plugin itself (its own importlib-based loader).
addopts = --import-mode=importlib
